<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Techno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 380px;
            min-height: 480px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            color: #e8e0f0;
            overflow: hidden;
            position: relative;
        }

        #galaxy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--duration) infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        #nebula {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 30% 50%, rgba(0, 200, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 0, 100, 0.06) 0%, transparent 50%);
            animation: nebulaFloat 60s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes nebulaFloat {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 3%) rotate(5deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 18px 20px 22px;
            background: rgba(10, 14, 26, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            margin: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 26px;
            filter: drop-shadow(0 0 15px rgba(0, 200, 255, 0.3));
        }

        .title {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(0, 200, 255, 0.12);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 9px;
            letter-spacing: 0.5px;
            color: #00d4ff;
            border: 1px solid rgba(0, 200, 255, 0.15);
            animation: pulseBadge 2s ease-in-out infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .techno-hero {
            position: relative;
            width: 100%;
            height: 80px;
            margin-bottom: 16px;
            border-radius: 14px;
            background: radial-gradient(ellipse at center, rgba(0, 100, 200, 0.15), transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .techno-silhouette {
            font-size: 60px;
            filter: drop-shadow(0 0 40px rgba(0, 200, 255, 0.2));
            opacity: 0.85;
            transition: all 0.4s;
            line-height: 1;
            text-shadow: 0 0 50px rgba(0, 200, 255, 0.1);
        }

        .techno-silhouette:hover {
            transform: scale(1.04);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 14px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-row .label {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.5;
            min-width: 40px;
        }

        .play-btn {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.2), rgba(123, 47, 252, 0.15));
            border: 1px solid rgba(0, 200, 255, 0.15);
            color: #00d4ff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            flex: 0 0 auto;
        }

        .play-btn:hover {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.3), rgba(123, 47, 252, 0.25));
            border-color: rgba(0, 200, 255, 0.3);
            transform: scale(1.02);
        }

        .play-btn.active {
            background: linear-gradient(135deg, rgba(255, 50, 50, 0.2), rgba(200, 0, 0, 0.15));
            border-color: rgba(255, 80, 80, 0.2);
            color: #ff6b6b;
        }

        .play-btn .icon {
            font-size: 16px;
        }

        .slider-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, rgba(0, 200, 255, 0.2), rgba(0, 200, 255, 0.4));
            outline: none;
            transition: all 0.2s;
            flex: 1;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #00d4ff, #7b2ffc);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
        }

        .slider-value {
            font-size: 10px;
            opacity: 0.4;
            min-width: 28px;
            text-align: right;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .presets {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 4px;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            padding: 4px 4px;
            border-radius: 6px;
            font-size: 7px;
            font-weight: 300;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-family: inherit;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
        }

        .preset-btn.active {
            background: rgba(0, 200, 255, 0.08);
            border-color: rgba(0, 200, 255, 0.15);
            color: #00d4ff;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 9px;
            opacity: 0.3;
            letter-spacing: 0.5px;
        }

        .bpm-display {
            color: #00d4ff;
            font-size: 10px;
            font-weight: 300;
            opacity: 0.6;
            min-width: 30px;
            text-align: right;
        }

        .bg-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #00d4ff;
            font-size: 8px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div id="galaxy-bg">
        <div id="nebula"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo-area">
                <span class="logo-icon">🔊</span>
                <span class="title">The Techno</span>
            </div>
            <div class="status-badge" id="statusBadge">● LIVE</div>
        </div>

        <div class="techno-hero">
            <div class="techno-silhouette">🎛️</div>
        </div>

        <div class="controls">
            <div class="control-row">
                <button class="play-btn active" id="playBtn">
                    <span class="icon">⏸</span> <span id="playLabel">Pause</span>
                </button>
                <div class="slider-container">
                    <span class="label">VOL</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                    <span class="slider-value" id="volumeValue">70%</span>
                </div>
                <span class="bpm-display" id="bpmDisplay">128</span>
            </div>

            <div class="presets">
                <button class="preset-btn active" data-preset="club">Club</button>
                <button class="preset-btn" data-preset="warehouse">Ware</button>
                <button class="preset-btn" data-preset="chillout">Chill</button>
                <button class="preset-btn" data-preset="progressive">Prog</button>
                <button class="preset-btn" data-preset="techno">Hard</button>
            </div>
        </div>

        <div class="status-bar">
            <span id="timeDisplay">00:00</span>
            <span id="noteCount">0 notes</span>
            <div class="bg-indicator">
                <span>🔊</span> <span id="presetDisplay">Club</span>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
